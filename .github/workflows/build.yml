name: Build, Test, and Deploy

on: [push, release, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Install NuGet credential provider
      run: dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget.org || true

    - name: Build
      run: dotnet build --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release

    - name: Pack
      run: dotnet pack src --no-build --configuration Release --output ./nupkg

    - name: Publish to NuGet
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push ./nupkg/*.nupkg -s https://api.nuget.org/v3/index.json

    - name: Publish to GitHub Packages
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push ./nupkg/*.nupkg -k ${{ secrets.GPM_TOKEN }} -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
